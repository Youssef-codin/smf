info:
  name: event
  type: http
  seq: 1
  tags:
    - event-controller

http:
  method: POST
  url: "{{baseUrl}}/api/v1/events/device"
  body:
    type: json
    data: |-
      {
        "macAddress": "",
        "event": "DEVICE_OFFLINE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/v1/events/device"
      method: POST
      body:
        type: json
        data: |-
          {
            "macAddress": "",
            "event": "DEVICE_OFFLINE"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "success": false,
            "message": "",
            "data": "",
            "time": ""
          }
