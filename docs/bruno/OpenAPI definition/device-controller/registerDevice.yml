info:
  name: registerDevice
  type: http
  seq: 6
  tags:
    - device-controller

http:
  method: POST
  url: "{{baseUrl}}/api/v1/devices/"
  body:
    type: json
    data: |-
      {
        "smfDeviceLabel": "",
        "ownerId": "",
        "lastLocationLat": 0,
        "lastLocationLon": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
