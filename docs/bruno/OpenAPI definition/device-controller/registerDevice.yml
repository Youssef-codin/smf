    description: OK
    request:
      url: "{{baseUrl}}/api/v1/devices/"
      method: POST
      body:
        type: json
        data: |-
          {
            "smfDeviceLabel": "",
            "ownerId": "",
            "lastLocationLat": 0,
            "lastLocationLon": 0
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "success": false,
            "message": "",
            "data": "",
            "time": ""
          }
